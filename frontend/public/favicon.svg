<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
	<defs>
		<linearGradient id="f-m-base" x1="8" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#f5f6f8"/>
			<stop offset="0.5" stop-color="#bec2c9"/>
			<stop offset="1" stop-color="#f0f1f4"/>
		</linearGradient>
		<radialGradient id="f-m-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(31 21) rotate(90) scale(32)">
			<stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
			<stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
		</radialGradient>
		<linearGradient id="f-ring" x1="21" y1="20" x2="42" y2="42" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#ffffff" stop-opacity="0.82"/>
			<stop offset="1" stop-color="#9ea3ab" stop-opacity="0.7"/>
		</linearGradient>
		<mask id="f-cut" maskUnits="userSpaceOnUse" x="5" y="5" width="54" height="54">
			<rect x="5" y="5" width="54" height="54" rx="14" fill="white"/>
			<circle cx="32" cy="32" r="9.3" fill="black"/>
		</mask>
	</defs>

	<g mask="url(#f-cut)">
		<rect x="5" y="5" width="54" height="54" rx="14" fill="url(#f-m-base)"/>
		<rect x="5" y="5" width="54" height="54" rx="14" fill="url(#f-m-glow)"/>
	</g>

	<circle cx="32" cy="32" r="10" fill="none" stroke="url(#f-ring)" stroke-width="1.8"/>
</svg>