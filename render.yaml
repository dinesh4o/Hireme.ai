services:
  - type: web
    name: hiremeai-backend
    env: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: APP_MODE
        value: local
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: LLM_TEMPERATURE
        value: 0.2
      - key: ALLOWED_ORIGINS
        value: https://hiremeai.vercel.app
      - key: GROQ_API_KEYS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: interview_copilot
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_OAUTH_SUCCESS_URL
        value: https://hiremeai.vercel.app
      - key: FRONTEND_OAUTH_FAILURE_URL
        value: https://hiremeai.vercel.app
